<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ResearchAI</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">
                <span>🔬</span>
                <span>ResearchAI</span>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Login to continue analyzing research papers</p>

            <form id="loginForm">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn" id="loginBtn">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" style="display:none">⏳</span>
                </button>
            </form>

            <p class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="auth.js"></script>
</body>
</html>
