<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – ResearchAI</title>
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="brand">
                <span>🔬</span>
                <span>ResearchAI</span>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join us to start analyzing research papers with AI</p>

            <form id="signupForm">
                <div class="field">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password">
                </div>
                <div class="field">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display:none">⏳</span>
                </button>
            </form>

            <p class="switch-link">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="auth.js"></script>
</body>
</html>
